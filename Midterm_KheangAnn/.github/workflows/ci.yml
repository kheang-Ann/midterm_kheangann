name: CI - Automated Tests

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run test suites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: social-media/package-lock.json

      - name: Install dependencies
        working-directory: social-media
        run: npm ci

      - name: Run unit & integration tests
        working-directory: social-media
        run: npm test -- --forceExit --ci

      - name: Run e2e tests
        working-directory: social-media
        run: npm run test:e2e -- --forceExit --ci

      # ── Notify on success ───────────────────────────────────────────────────
      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ [PASS] Tests passed — ${{ github.repository }} (${{ github.ref_name }})"
          to: ${{ github.event.head_commit.author.email }}, srengty@gmail.com
          from: "CI Bot <${{ secrets.MAIL_USERNAME }}>"
          body: |
            All tests passed for the following commit:

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit SHA : ${{ github.sha }}
            Author     : ${{ github.event.head_commit.author.name }} <${{ github.event.head_commit.author.email }}>
            Message    : ${{ github.event.head_commit.message }}

            View run   : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # ── Notify on failure ───────────────────────────────────────────────────
      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ [FAIL] Tests failed — ${{ github.repository }} (${{ github.ref_name }})"
          to: ${{ github.event.head_commit.author.email }}, srengty@gmail.com
          from: "CI Bot <${{ secrets.MAIL_USERNAME }}>"
          body: |
            Tests FAILED for the following commit. Please review and fix.

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit SHA : ${{ github.sha }}
            Author     : ${{ github.event.head_commit.author.name }} <${{ github.event.head_commit.author.email }}>
            Message    : ${{ github.event.head_commit.message }}

            View run   : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
